chat_policy:
  chat_first: true
  ordinary_chat_creates_tasks: false
  explicit_task_triggers:
    - "task:"
    - "task"

review_policy:
  archimedes_required_for:
    - code
    - code_review
    - production_change

  anton_required_for:
    - risky
    - deploy
    - ship
    - quant
    - high_stakes

approval_policy:
  require_approval_for:
    - code_change
    - flowstate_promotion
    - deploy
    - quant
    - high_stakes_output

flowstate_policy:
  auto_promote: false
  allow_memory_write_without_approval: false
  allow_task_creation_without_approval: false

model_policy:
  qwen_only: true
  allowed_families:
    - qwen3.5

storage_policy:
  task_store_backend: sqlite
  artifact_index_backend: json
  review_store_backend: json
  approval_store_backend: json

browser_policy:
  enabled: false
  default_backend: pinchtab
  require_confirmation_for_sensitive: true
  screenshot_on_major_actions: true
  max_actions_per_session: 50

voice_policy:
  enabled: false
  wake_phrase: "Jarvis"
  require_wake_phrase: true
  require_task_confirmation: true
  speaker_guard_enabled: false
  fallback_to_text: true

desktop_policy:
  enabled: false
  require_confirmation_for_destructive: true
  allowed_apps: []
  blocked_apps: []

risk_tier_policy:
  high_risk_requires_text_confirmation: true
  medium_risk_voice_allowed: true
  low_risk_auto_execute: false
